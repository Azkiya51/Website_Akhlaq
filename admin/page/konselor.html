<div class="container-fluid">

    <div class="topbar">
        <div>
            <h2 class="fw-bold">Konselor</h2>
            <p class="text-secondary">
                Kelola data konselor
            </p>
        </div>

        <button class="btn btn-primary"
            data-bs-toggle="modal"
            data-bs-target="#tambahKonselorModal">

            <i class="fa-solid fa-plus"></i>
            Tambah Konselor

        </button>
    </div>

    <div class="card shadow-sm border-0">

        <div class="card-header bg-white py-3">
            <h6 class="m-0 fw-bold text-primary">
                Data Konselor
            </h6>
        </div>

        <div class="card-body">

            <div class="table-responsive">

                <table class="table table-bordered table-hover align-middle">

                    <thead>
                        <tr>
                            <th>No</th>
                            <th>Foto</th>
                            <th>Nama</th>
                            <th>Email</th>
                            <th>Spesialisasi</th>
                            <th>Status</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>

                    <tbody id="konselorBody">

                        <tr>
                            <td>1</td>

                            <td>
                                <img src="https://i.pravatar.cc/40?img=1"
                                    class="rounded-circle">
                            </td>

                            <td>Dr. Sarah Putri</td>

                            <td>
                                sarah@gmail.com
                            </td>

                            <td>
                                Kesehatan Mental
                            </td>

                            <td>
                                <span class="badge bg-success">
                                    Aktif
                                </span>
                            </td>

                            <td>
                                <button class="btn btn-warning btn-sm">
                                    Edit
                                </button>

                                <button class="btn btn-danger btn-sm">
                                    Hapus
                                </button>
                            </td>

                        </tr>

                    </tbody>

                </table>
                <div class="modal fade"
    id="tambahKonselorModal">

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header">

                <h5>Tambah Konselor</h5>

                <button class="btn-close"
                    data-bs-dismiss="modal"></button>

            </div>

            <div class="modal-body">

                <input type="text"
                    id="namaKonselor"
                    class="form-control mb-3"
                    placeholder="Nama Konselor">

                <input type="email"
                    id="emailKonselor"
                    class="form-control mb-3"
                    placeholder="Email">

                <select id="spesialisasi"
                    class="form-select mb-3">

                    <option>Kesehatan Mental</option>
                    <option>Akademik</option>
                    <option>Keluarga</option>
                    <option>Karir</option>

                </select>

                <select id="statusKonselor"
                    class="form-select">

                    <option>Aktif</option>
                    <option>Nonaktif</option>

                </select>

            </div>

            <div class="modal-footer">

                <button class="btn btn-primary"
                    onclick="tambahKonselor()">

                    Simpan

                </button>

            </div>

        </div>

    </div>

</div>

            </div>

        </div>

    </div>

</div>
